<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Simple Card Game</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf7f2;
    --dark: #1a1a2e;
    --subject-front: #2d6a4f;
    --subject-back: #1b4332;
    --action-front: #c77dff;
    --action-back: #7b2d8b;
    --accent: #f4a261;
    --selected-glow: #f4a261;
    --text-light: #faf7f2;
    --card-w: 130px;
    --card-h: 85px;
  }

  body {
    background: var(--dark);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 40px;
    color: var(--text-light);
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(44,106,79,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(123,45,139,0.18) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    color: var(--accent);
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }

  .instructions {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 20px;
    max-width: 640px;
    margin: 0 auto;
    font-size: 0.95rem;
    line-height: 1.6;
    color: rgba(250,247,242,0.85);
  }

  .instructions strong { color: var(--accent); }

  /* SELECTED SENTENCE BAR */
  .sentence-bar {
    max-width: 800px;
    margin: 0 auto 28px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(244,162,97,0.3);
    border-radius: 14px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 60px;
    flex-wrap: wrap;
  }

  .sentence-bar .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  .sentence-bar .chips {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: 600;
  }

  .chip.subject { background: var(--subject-front); color: #fff; }
  .chip.action { background: var(--action-back); color: #fff; }
  .chip.empty {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.3);
    border: 1px dashed rgba(255,255,255,0.2);
  }

  .reset-btn {
    margin-left: auto;
    background: rgba(244,162,97,0.15);
    border: 1px solid rgba(244,162,97,0.4);
    color: var(--accent);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 0.82rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .reset-btn:hover { background: rgba(244,162,97,0.3); }

  /* SECTIONS */
  .sections {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  .section {
    background: rgba(255,255,255,0.03);
    border-radius: 18px;
    padding: 20px 20px 24px;
    border: 1px solid rgba(255,255,255,0.07);
  }

  .section-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .section-title.subject { color: #52b788; }
  .section-title.action { color: #c77dff; }

  /* CARD GRID */
  .card-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  /* CARD */
  .card {
    width: var(--card-w);
    height: var(--card-h);
    perspective: 600px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 10px;
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    text-align: center;
  }

  /* SUBJECT card faces */
  .card.subject .card-back-face {
    background: linear-gradient(135deg, #2d6a4f, #1b4332);
    border: 1.5px solid rgba(82,183,136,0.4);
  }

  .card.subject .card-front-face {
    background: linear-gradient(135deg, #40916c, #2d6a4f);
    border: 1.5px solid rgba(82,183,136,0.6);
    transform: rotateY(180deg);
  }

  /* ACTION card faces */
  .card.action .card-back-face {
    background: linear-gradient(135deg, #7b2d8b, #4a1259);
    border: 1.5px solid rgba(199,125,255,0.4);
  }

  .card.action .card-front-face {
    background: linear-gradient(135deg, #9d4edd, #7b2d8b);
    border: 1.5px solid rgba(199,125,255,0.6);
    transform: rotateY(180deg);
  }

  /* Back pattern */
  .card-back-face::before {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.12);
    background: repeating-linear-gradient(
      45deg,
      rgba(255,255,255,0.03),
      rgba(255,255,255,0.03) 2px,
      transparent 2px,
      transparent 8px
    );
  }

  .card-back-face .card-icon {
    font-size: 1.4rem;
    position: relative;
    z-index: 1;
  }

  .card-front-face .card-text {
    font-size: 0.78rem;
    font-weight: 600;
    color: #fff;
    line-height: 1.3;
  }

  .card-front-face .card-text strong {
    display: block;
    font-size: 0.95rem;
  }

  /* SELECTED state */
  .card.selected .card-front-face {
    box-shadow: 0 0 0 2.5px var(--selected-glow), 0 0 20px rgba(244,162,97,0.4);
  }

  .card.selected.subject .card-front-face {
    background: linear-gradient(135deg, #52b788, #2d6a4f);
  }

  .card.selected.action .card-front-face {
    background: linear-gradient(135deg, #c77dff, #9d4edd);
  }

  /* Already flipped but not selected — dim slightly */
  .card.flipped:not(.selected) .card-front-face {
    opacity: 0.65;
  }

  footer {
    text-align: center;
    margin-top: 36px;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.25);
  }
</style>
</head>
<body>

<header>
  <h1>Past Simple Card Game</h1>
  <div class="instructions">
    Flip one <strong style="color:#52b788">Subject card</strong> and one <strong style="color:#c77dff">Action card</strong>. Use them to talk about yourself in the past simple. For example, <em>"I went to the beach."</em> or <em>"I didn't go to the beach."</em>
  </div>
</header>

<div class="sentence-bar">
  <span class="label">Your cards:</span>
  <div class="chips">
    <span class="chip subject empty" id="selected-subject">Subject</span>
    <span class="chip action empty" id="selected-action">Action</span>
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ Reset all</button>
</div>

<div class="sections">

  <div class="section">
    <div class="section-title subject">Subject Cards</div>
    <div class="card-grid" id="subject-grid"></div>
  </div>

  <div class="section">
    <div class="section-title action">Action Cards</div>
    <div class="card-grid" id="action-grid"></div>
  </div>

</div>

<footer>Past Simple Practice · A2 Level · Flip · Form · Speak</footer>

<script>
const subjects = [
  "I","You","He","She","They","We","The teacher","My mum",
  "My dad","My brother","My sister","My friend","My parents",
  "My family","My classmate","My friends","My grandma",
  "My grandpa","My uncle","The students"
];

const actions = [
  {verb:"go", rest:"to the beach"},
  {verb:"watch", rest:"a movie"},
  {verb:"play", rest:"football"},
  {verb:"eat", rest:"at a restaurant"},
  {verb:"learn", rest:"English"},
  {verb:"read", rest:"a book"},
  {verb:"listen", rest:"to music"},
  {verb:"buy", rest:"new clothes"},
  {verb:"take", rest:"photos"},
  {verb:"write", rest:"a message"},
  {verb:"make", rest:"a cake"},
  {verb:"see", rest:"a friend"},
  {verb:"finish", rest:"work"},
  {verb:"dance", rest:"at a party"},
  {verb:"walk", rest:"in the park"},
  {verb:"cook", rest:"dinner"},
  {verb:"meet", rest:"a neighbour"},
  {verb:"lose", rest:"the keys"},
  {verb:"break", rest:"a glass"},
  {verb:"find", rest:"the luggage"},
];

let selectedSubject = null;
let selectedAction = null;

function buildGrid(containerId, items, type) {
  const grid = document.getElementById(containerId);
  items.forEach((item, i) => {
    const card = document.createElement('div');
    card.className = `card ${type}`;
    card.dataset.index = i;

    const label = type === 'subject'
      ? item
      : `<strong>${item.verb}</strong> ${item.rest}`;

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back-face">
          <span class="card-icon">${type === 'subject' ? '👤' : '⚡'}</span>
        </div>
        <div class="card-face card-front-face">
          <span class="card-text">${label}</span>
        </div>
      </div>
    `;

    card.addEventListener('click', () => handleClick(card, type, i));
    grid.appendChild(card);
  });
}

function handleClick(card, type, index) {
  // Flip it if not already flipped
  card.classList.add('flipped');

  if (type === 'subject') {
    // Deselect previous
    if (selectedSubject !== null) {
      document.querySelectorAll('.card.subject').forEach(c => c.classList.remove('selected'));
    }
    selectedSubject = index;
    card.classList.add('selected');
    document.getElementById('selected-subject').textContent = subjects[index];
    document.getElementById('selected-subject').classList.remove('empty');
  } else {
    if (selectedAction !== null) {
      document.querySelectorAll('.card.action').forEach(c => c.classList.remove('selected'));
    }
    selectedAction = index;
    card.classList.add('selected');
    const a = actions[index];
    document.getElementById('selected-action').textContent = `${a.verb} ${a.rest}`;
    document.getElementById('selected-action').classList.remove('empty');
  }
}

function resetAll() {
  selectedSubject = null;
  selectedAction = null;
  document.querySelectorAll('.card').forEach(c => {
    c.classList.remove('flipped', 'selected');
  });
  const ss = document.getElementById('selected-subject');
  const sa = document.getElementById('selected-action');
  ss.textContent = 'Subject';
  ss.classList.add('empty');
  sa.textContent = 'Action';
  sa.classList.add('empty');
}

buildGrid('subject-grid', subjects, 'subject');
buildGrid('action-grid', actions, 'action');
</script>
</body>
</html>
